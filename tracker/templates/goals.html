<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Goals - Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Simple Header -->
    <div
        style="background: rgba(255, 255, 255, 0.05); padding: 1rem; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 1.25rem; font-weight: 600;">💰 Expense Tracker</div>
            <a href="/logout" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">Logout</a>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="container">
            <div class="page-header">
                <a href="/dashboard" class="back-btn">Dashboard</a>
                <h1>💰 Savings Goals</h1>
            </div>
        </div>

        <!-- Add Goal Form -->
        <div class="card">
            <div class="card-header">
                <h2>Create New Goal</h2>
            </div>
            <div class="card-body">
                <form id="goal-form">
                    <div class="form-row">
                        <div class="form-group" style="flex: 1.5;">
                            <label class="form-label">Goal Name *</label>
                            <input type="text" id="goal-name" class="form-control"
                                placeholder="e.g., New Laptop, Vacation" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Target Amount (₹) *</label>
                            <input type="number" id="target-amount" class="form-control" step="0.01" required
                                placeholder="50000">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Deadline (Optional)</label>
                            <input type="date" id="deadline" class="form-control">
                        </div>
                        <div class="form-group" style="display: flex; align-items: flex-end;">
                            <button type="submit" class="btn btn-primary" style="width: 100%; margin: 0;">
                                🎯 Create Goal
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Goals List -->
        <div id="goals-container">
            <!-- Goals will be loaded here -->
        </div>
    </div>

    <div id="alert-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadGoals();
        });

        // Add goal
        document.getElementById('goal-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const goalData = {
                name: document.getElementById('goal-name').value.trim(),
                target_amount: parseFloat(document.getElementById('target-amount').value),
                deadline: document.getElementById('deadline').value || null
            };

            try {
                const response = await fetch('/api/goals', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(goalData)
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(data.message, 'success');
                    document.getElementById('goal-form').reset();
                    loadGoals();
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                showAlert('Failed to create goal', 'error');
            }
        });

        // Load goals
        async function loadGoals() {
            try {
                const response = await fetch('/api/goals');
                const data = await response.json();

                if (data.success) {
                    displayGoals(data.data);
                }
            } catch (error) {
                showAlert('Failed to load goals', 'error');
            }
        }

        // Display goals
        function displayGoals(goals) {
            const container = document.getElementById('goals-container');

            if (goals.length === 0) {
                container.innerHTML = '<div class="card"><div class="card-body"><p class="text-muted">No goals yet. Create your first savings goal above!</p></div></div>';
                return;
            }

            container.innerHTML = goals.map(goal => {
                const deadlineDays = goal.deadline ? Math.ceil((new Date(goal.deadline) - new Date()) / (1000 * 60 * 60 * 24)) : null;

                return `
                    <div class="card">
                        <div class="card-header">
                            <h2>${goal.name} ${goal.achieved ? '✅' : ''}</h2>
                            ${goal.deadline ? `<span class="badge">${deadlineDays} days left</span>` : ''}
                        </div>
                        <div class="card-body">
                            <div class="stats-grid">
                                <div class="stat-card">
                                    <div class="stat-label">Target</div>
                                    <div class="stat-value">₹${goal.target.toFixed(2)}</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-label">Saved</div>
                                    <div class="stat-value">₹${goal.current.toFixed(2)}</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-label">Remaining</div>
                                    <div class="stat-value">₹${(goal.target - goal.current).toFixed(2)}</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-label">Progress</div>
                                    <div class="stat-value">${goal.percentage.toFixed(1)}%</div>
                                </div>
                            </div>
                            <div class="progress" style="margin-top: 20px;">
                                <div class="progress-bar" style="width: ${Math.min(goal.percentage, 100)}%"></div>
                            </div>
                            <div style="margin-top: 20px; display: flex; gap: 10px; align-items: center;">
                                <input type="number" id="add-amount-${goal.goal_id}" class="form-control" 
                                       placeholder="Enter amount to add" step="0.01" style="flex: 1;">
                                <button class="btn btn-success" onclick="addProgress(${goal.goal_id})" 
                                        style="white-space: nowrap; min-width: 150px;">
                                    💰 Add Progress
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Add progress to goal
        async function addProgress(goalId) {
            const amount = parseFloat(document.getElementById(`add-amount-${goalId}`).value);

            if (!amount || amount <= 0) {
                showAlert('Please enter a valid amount', 'error');
                return;
            }

            try {
                const response = await fetch(`/api/goals/${goalId}/progress`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(data.message, 'success');
                    loadGoals();
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                showAlert('Failed to update progress', 'error');
            }
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.appendChild(alert);
            setTimeout(() => alert.remove(), 3000);
        }
    </script>

    <style>
        .text-muted {
            color: var(--text-secondary);
            text-align: center;
            padding: 20px;
        }
    </style>
</body>

</html>
