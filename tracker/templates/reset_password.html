<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🔐 Reset Password</h1>
                <p>Enter the OTP sent to your email and your new password</p>
            </div>

            <div id="success-message" class="alert alert-success hidden"></div>
            <div id="error-message" class="alert alert-danger hidden"></div>

            <form id="reset-password-form">
                <input type="hidden" id="token" name="token" value="{{ token }}">

                <div class="form-group">
                    <label class="form-label" for="otp">One-Time Password (OTP)</label>
                    <input type="text" id="otp" class="form-control" placeholder="Enter 6-digit OTP" maxlength="6"
                        pattern="[0-9]{6}" required autofocus>
                    <small class="form-text">Check your email for the 6-digit code</small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="new-password">New Password</label>
                    <input type="password" id="new-password" class="form-control" placeholder="Enter new password"
                        required>
                    <small class="form-text">Minimum 8 characters, must contain letters and numbers</small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Confirm new password"
                        required>
                </div>

                <!-- Password strength indicator -->
                <div id="password-strength" class="password-strength hidden">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <span id="strength-text"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
                    Reset Password
                </button>
            </form>

            <div class="auth-footer">
                <p>Didn't receive OTP? <a href="/forgot-password">Request new link</a></p>
                <p>Remember your password? <a href="/">Login</a></p>
            </div>
        </div>
    </div>

    <style>
        .password-strength {
            margin-bottom: 1rem;
        }

        .strength-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .strength-fill {
            height: 100%;
            transition: all 0.3s ease;
            border-radius: 3px;
        }

        .strength-fill.weak {
            width: 33%;
            background: #ff6b6b;
        }

        .strength-fill.medium {
            width: 66%;
            background: #ffd93d;
        }

        .strength-fill.strong {
            width: 100%;
            background: #6bcf7f;
        }

        #strength-text {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .form-text {
            display: block;
            margin-top: 0.25rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }
    </style>

    <script>
        // Get token from URL if not in form
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        if (tokenFromUrl) {
            document.getElementById('token').value = tokenFromUrl;
        }

        // Password strength checker
        const newPasswordInput = document.getElementById('new-password');
        const strengthDiv = document.getElementById('password-strength');
        const strengthFill = document.getElementById('strength-fill');
        const strengthText = document.getElementById('strength-text');

        newPasswordInput.addEventListener('input', () => {
            const password = newPasswordInput.value;

            if (password.length === 0) {
                strengthDiv.classList.add('hidden');
                return;
            }

            strengthDiv.classList.remove('hidden');

            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            strengthFill.className = 'strength-fill';

            if (strength <= 2) {
                strengthFill.classList.add('weak');
                strengthText.textContent = 'Weak password';
            } else if (strength === 3) {
                strengthFill.classList.add('medium');
                strengthText.textContent = 'Medium strength';
            } else {
                strengthFill.classList.add('strong');
                strengthText.textContent = 'Strong password';
            }
        });

        // OTP input - only allow numbers
        document.getElementById('otp').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        // Form submission
        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const successDiv = document.getElementById('success-message');
            const errorDiv = document.getElementById('error-message');

            const token = document.getElementById('token').value;
            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Hide previous messages
            successDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');

            // Client-side validation
            if (otp.length !== 6) {
                errorDiv.textContent = 'OTP must be 6 digits';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (newPassword.length < 8) {
                errorDiv.textContent = 'Password must be at least 8 characters';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (!/[a-zA-Z]/.test(newPassword) || !/[0-9]/.test(newPassword)) {
                errorDiv.textContent = 'Password must contain both letters and numbers';
                errorDiv.classList.remove('hidden');
                return;
            }

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.remove('hidden');
                return;
            }

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token,
                        otp,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    successDiv.textContent = data.message;
                    successDiv.classList.remove('hidden');
                    document.getElementById('reset-password-form').reset();

                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'An error occurred. Please try again.';
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>

</html>
